global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "CatalogAPI"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:80"]
        labels:
          app: "catalog-api"